<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Restaurant and Reservation cover">
  <defs>
    <pattern id="rs-tibeb" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
      <polygon points="0,16 16,0 32,16" fill="#221a10" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1024" height="1280" fill="#dcc88e"/>

  <!-- Top tibeb -->
  <line x1="0" y1="138" x2="1024" y2="138" stroke="#221a10" stroke-width="1" opacity="0.55"/>
  <rect x="0" y="140" width="1024" height="16" fill="url(#rs-tibeb)"/>
  <line x1="0" y1="158" x2="1024" y2="158" stroke="#221a10" stroke-width="1" opacity="0.55"/>

  <!-- Eyebrows -->
  <g fill="#221a10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="64" y="100" font-size="22" letter-spacing="4">05 — HOSPITALITY</text>
    <text x="960" y="100" text-anchor="end" font-size="22" letter-spacing="4" opacity="0.6">2021</text>
  </g>

  <!-- Mesob (basket) concentric rings centered at 512, 580 -->
  <g transform="translate(512 580)" fill="none" stroke="#221a10">
    <circle r="260" stroke-width="1.4" opacity="0.35"/>
    <circle r="220" stroke-width="1.4" opacity="0.45"/>
    <circle r="180" stroke-width="1.4" opacity="0.55"/>
    <circle r="140" stroke-width="1.4" opacity="0.65"/>
    <circle r="100" stroke-width="1.4" opacity="0.75"/>
    <circle r="60" stroke-width="1.4" opacity="0.85"/>
    <circle r="20" fill="#221a10" stroke="none" opacity="0.85"/>
    <!-- Eight radial tibeb spokes (basket weave) -->
    <g stroke-width="1" opacity="0.4">
      <line x1="0" y1="-260" x2="0" y2="260"/>
      <line x1="-260" y1="0" x2="260" y2="0"/>
      <line x1="-184" y1="-184" x2="184" y2="184"/>
      <line x1="-184" y1="184" x2="184" y2="-184"/>
    </g>
  </g>

  <!-- Title -->
  <g fill="#221a10" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic">
    <text x="512" y="920" text-anchor="middle" font-size="120" letter-spacing="-3">Restaurant</text>
    <text x="512" y="1010" text-anchor="middle" font-size="58" letter-spacing="1" opacity="0.6">&amp; Reservation</text>
  </g>

  <!-- Bottom tibeb -->
  <line x1="0" y1="1098" x2="1024" y2="1098" stroke="#221a10" stroke-width="1" opacity="0.55"/>
  <rect x="0" y="1100" width="1024" height="16" fill="url(#rs-tibeb)"/>
  <line x1="0" y1="1118" x2="1024" y2="1118" stroke="#221a10" stroke-width="1" opacity="0.55"/>

  <!-- Footer eyebrows -->
  <g fill="#221a10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="64" y="1190" font-size="20" letter-spacing="3" opacity="0.7">NYLOS</text>
    <text x="960" y="1190" text-anchor="end" font-size="20" letter-spacing="3" opacity="0.7">MENU&#160;·&#160;BOOKING</text>
  </g>
</svg>
