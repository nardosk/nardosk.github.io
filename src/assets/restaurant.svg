<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Restaurant and Reservation cover">
  <rect width="1024" height="1280" fill="#d6c180"/>

  <!-- Inset frame -->
  <rect x="64" y="64" width="896" height="1152" fill="none" stroke="#21180c" stroke-width="1" opacity="0.25"/>

  <!-- Top eyebrow -->
  <g fill="#21180c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="124" font-size="20" letter-spacing="4">05 — HOSPITALITY</text>
    <text x="920" y="124" text-anchor="end" font-size="20" letter-spacing="4" opacity="0.55">2021</text>
  </g>

  <!-- Mesob emblem — single elegant circle with two inner rings and eight-fold spokes -->
  <g transform="translate(512 540)" fill="none" stroke="#21180c">
    <circle r="220" stroke-width="1.2"/>
    <circle r="150" stroke-width="1" opacity="0.5"/>
    <circle r="80" stroke-width="1" opacity="0.7"/>
    <!-- Eight-fold radial spokes confined to the outer ring -->
    <g stroke-width="0.8" opacity="0.45">
      <line x1="0" y1="-220" x2="0" y2="-150"/>
      <line x1="0" y1="150" x2="0" y2="220"/>
      <line x1="-220" y1="0" x2="-150" y2="0"/>
      <line x1="150" y1="0" x2="220" y2="0"/>
      <line x1="-155" y1="-155" x2="-106" y2="-106"/>
      <line x1="106" y1="-106" x2="155" y2="-155"/>
      <line x1="-155" y1="155" x2="-106" y2="106"/>
      <line x1="106" y1="106" x2="155" y2="155"/>
    </g>
    <!-- Central tiny diamond -->
    <polygon points="0,-18 18,0 0,18 -18,0" fill="#21180c" stroke="none"/>
  </g>

  <!-- Title -->
  <g fill="#21180c" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic">
    <text x="104" y="980" font-size="120" letter-spacing="-3">Restaurant</text>
    <text x="104" y="1050" font-size="58" letter-spacing="0" opacity="0.55">&amp; Reservation</text>
  </g>

  <!-- Bottom eyebrow -->
  <g fill="#21180c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="1180" font-size="18" letter-spacing="3" opacity="0.6">NYLOS</text>
    <text x="920" y="1180" text-anchor="end" font-size="18" letter-spacing="3" opacity="0.6">MENU&#160;·&#160;BOOKING</text>
  </g>
</svg>
