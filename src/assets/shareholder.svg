<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Shareholder Management cover">
  <rect width="1024" height="1280" fill="#cdb0ad"/>

  <!-- Inset frame -->
  <rect x="64" y="64" width="896" height="1152" fill="none" stroke="#1d1311" stroke-width="1" opacity="0.25"/>

  <!-- Top eyebrow -->
  <g fill="#1d1311" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="124" font-size="20" letter-spacing="4">02 — FINTECH</text>
    <text x="920" y="124" text-anchor="end" font-size="20" letter-spacing="4" opacity="0.55">2023</text>
  </g>

  <!-- Central seal: nested diamonds with internal quartering — a single elegant emblem -->
  <g transform="translate(512 540)" stroke="#1d1311" fill="none">
    <!-- Outer diamond -->
    <polygon points="0,-240 240,0 0,240 -240,0" stroke-width="1.2"/>
    <!-- Inner diamond -->
    <polygon points="0,-160 160,0 0,160 -160,0" stroke-width="1.2" opacity="0.7"/>
    <!-- Quartering rules from outer corners through centre -->
    <line x1="-240" y1="0" x2="240" y2="0" stroke-width="0.8" opacity="0.45"/>
    <line x1="0" y1="-240" x2="0" y2="240" stroke-width="0.8" opacity="0.45"/>
    <!-- Tiny central diamond filled -->
    <polygon points="0,-24 24,0 0,24 -24,0" fill="#1d1311" stroke="none"/>
  </g>

  <!-- Title — italic, set below the seal -->
  <g fill="#1d1311" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic">
    <text x="104" y="980" font-size="120" letter-spacing="-3">Shareholder</text>
    <text x="104" y="1050" font-size="60" letter-spacing="0" opacity="0.55">Management</text>
  </g>

  <!-- Bottom eyebrow -->
  <g fill="#1d1311" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="1180" font-size="18" letter-spacing="3" opacity="0.6">NYLOS</text>
    <text x="920" y="1180" text-anchor="end" font-size="18" letter-spacing="3" opacity="0.6">EQUITY&#160;·&#160;REGISTRAR</text>
  </g>
</svg>
