<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="NYLOS Software cover">
  <rect width="1024" height="1280" fill="#b2afb8"/>

  <!-- Inset frame -->
  <rect x="64" y="64" width="896" height="1152" fill="none" stroke="#14131c" stroke-width="1" opacity="0.25"/>

  <!-- Top eyebrow -->
  <g fill="#14131c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="124" font-size="20" letter-spacing="4">06 — COMPANY</text>
    <text x="920" y="124" text-anchor="end" font-size="20" letter-spacing="4" opacity="0.55">2023</text>
  </g>

  <!--
    Stepped Greek cross silhouette inspired by Bet Giyorgis (Lalibela).
    A single bold, confident filled path with four bead terminals.
  -->
  <g transform="translate(512 560)" fill="#14131c">
    <!-- Outer halo, hairline -->
    <circle r="280" fill="none" stroke="#14131c" stroke-width="1" opacity="0.2"/>

    <!-- Stepped cross -->
    <path d="M -40 -200 L 40 -200 L 40 -100 L 100 -100 L 100 -40 L 200 -40 L 200 40 L 100 40 L 100 100 L 40 100 L 40 200 L -40 200 L -40 100 L -100 100 L -100 40 L -200 40 L -200 -40 L -100 -40 L -100 -100 L -40 -100 Z"/>

    <!-- Bead terminals at the four arm tips -->
    <circle cx="0" cy="-225" r="6"/>
    <circle cx="0" cy="225" r="6"/>
    <circle cx="-225" cy="0" r="6"/>
    <circle cx="225" cy="0" r="6"/>

    <!-- Subtle diagonal rays inside the halo — Meskel star feel -->
    <g stroke="#14131c" stroke-width="1" opacity="0.25" fill="none">
      <line x1="-155" y1="-155" x2="-198" y2="-198"/>
      <line x1="155" y1="-155" x2="198" y2="-198"/>
      <line x1="-155" y1="155" x2="-198" y2="198"/>
      <line x1="155" y1="155" x2="198" y2="198"/>
    </g>
  </g>

  <!-- Wordmark — formal serif (not italic) for the company name -->
  <text x="512" y="980" text-anchor="middle" fill="#14131c" font-family="Georgia, Cambria, 'Times New Roman', serif" font-size="160" letter-spacing="16">NYLOS</text>
  <text x="512" y="1030" text-anchor="middle" fill="#14131c" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic" font-size="30" letter-spacing="3" opacity="0.55">a software studio</text>

  <!-- Bottom eyebrow -->
  <g fill="#14131c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="1180" font-size="18" letter-spacing="3" opacity="0.6">EST. MMXXIII</text>
    <text x="920" y="1180" text-anchor="end" font-size="18" letter-spacing="3" opacity="0.6">ADDIS&#160;ABABA</text>
  </g>
</svg>
