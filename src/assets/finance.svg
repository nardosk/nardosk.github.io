<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Finance and Accounting cover">
  <rect width="1024" height="1280" fill="#b8c4b0"/>

  <!-- Inset frame -->
  <rect x="64" y="64" width="896" height="1152" fill="none" stroke="#142019" stroke-width="1" opacity="0.25"/>

  <!-- Top eyebrow -->
  <g fill="#142019" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="124" font-size="20" letter-spacing="4">03 — FINTECH</text>
    <text x="920" y="124" text-anchor="end" font-size="20" letter-spacing="4" opacity="0.55">2022</text>
  </g>

  <!-- Coptic-style manuscript marker — small Ethiopian cross at top-left of the page block -->
  <g transform="translate(104 360)" stroke="#142019" fill="none" stroke-width="1.5">
    <!-- Central diamond -->
    <polygon points="0,-12 12,0 0,12 -12,0" fill="#142019"/>
    <!-- Arms -->
    <line x1="0" y1="-12" x2="0" y2="-30"/>
    <line x1="0" y1="12" x2="0" y2="30"/>
    <line x1="-12" y1="0" x2="-30" y2="0"/>
    <line x1="12" y1="0" x2="30" y2="0"/>
    <!-- Terminal caps -->
    <line x1="-6" y1="-30" x2="6" y2="-30"/>
    <line x1="-6" y1="30" x2="6" y2="30"/>
    <line x1="-30" y1="-6" x2="-30" y2="6"/>
    <line x1="30" y1="-6" x2="30" y2="6"/>
  </g>

  <!-- Title — left-aligned like a manuscript opening -->
  <g fill="#142019" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic">
    <text x="104" y="500" font-size="180" letter-spacing="-4">Finance</text>
    <text x="104" y="600" font-size="88" letter-spacing="0" opacity="0.55">&amp; Accounting</text>
  </g>

  <!-- Ledger rules — quiet, evenly spaced -->
  <g stroke="#142019" stroke-width="0.8" opacity="0.4">
    <line x1="104" y1="720" x2="920" y2="720"/>
    <line x1="104" y1="770" x2="920" y2="770"/>
    <line x1="104" y1="820" x2="920" y2="820"/>
    <line x1="104" y1="870" x2="920" y2="870"/>
    <line x1="104" y1="920" x2="920" y2="920"/>
    <line x1="104" y1="970" x2="920" y2="970"/>
    <line x1="104" y1="1020" x2="920" y2="1020"/>
  </g>

  <!-- Ledger marginalia — a single italic note suggesting page balance -->
  <text x="920" y="1075" text-anchor="end" fill="#142019" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic" font-size="22" opacity="0.55">— balanced.</text>

  <!-- Bottom eyebrow -->
  <g fill="#142019" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="1180" font-size="18" letter-spacing="3" opacity="0.6">NYLOS</text>
    <text x="920" y="1180" text-anchor="end" font-size="18" letter-spacing="3" opacity="0.6">LEDGER&#160;·&#160;COMPLIANCE</text>
  </g>
</svg>
