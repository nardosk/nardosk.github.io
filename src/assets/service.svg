<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Service and Maintenance cover">
  <rect width="1024" height="1280" fill="#d0a08e"/>

  <!-- Inset frame -->
  <rect x="64" y="64" width="896" height="1152" fill="none" stroke="#221310" stroke-width="1" opacity="0.25"/>

  <!-- Top eyebrow -->
  <g fill="#221310" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="124" font-size="20" letter-spacing="4">04 — OPERATIONS</text>
    <text x="920" y="124" text-anchor="end" font-size="20" letter-spacing="4" opacity="0.55">2022</text>
  </g>

  <!-- Title -->
  <g fill="#221310" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic">
    <text x="104" y="500" font-size="180" letter-spacing="-4">Service</text>
    <text x="104" y="600" font-size="86" letter-spacing="0" opacity="0.55">&amp; Maintenance</text>
  </g>

  <!-- Single confident sheba zigzag — one row, generous height -->
  <g stroke="#221310" fill="none" stroke-width="2" opacity="0.85">
    <line x1="104" y1="800" x2="920" y2="800" stroke-width="0.8" opacity="0.5"/>
    <polyline points="104,860 168,800 232,860 296,800 360,860 424,800 488,860 552,800 616,860 680,800 744,860 808,800 872,860 920,820"/>
    <line x1="104" y1="900" x2="920" y2="900" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Caption beneath the band — workshop subtitle -->
  <text x="104" y="990" fill="#221310" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic" font-size="34" opacity="0.55">— the workshop floor, in software.</text>

  <!-- Bottom eyebrow -->
  <g fill="#221310" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="1180" font-size="18" letter-spacing="3" opacity="0.6">NYLOS</text>
    <text x="920" y="1180" text-anchor="end" font-size="18" letter-spacing="3" opacity="0.6">GARAGES&#160;·&#160;WORKSHOPS</text>
  </g>
</svg>
