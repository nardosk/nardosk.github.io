<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="NYLOS ERP cover">
  <rect width="1024" height="1280" fill="#e3d4b6"/>

  <!-- Inset frame -->
  <rect x="64" y="64" width="896" height="1152" fill="none" stroke="#1f1612" stroke-width="1" opacity="0.25"/>

  <!-- Top eyebrow -->
  <g fill="#1f1612" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="124" font-size="20" letter-spacing="4">01 — ENTERPRISE</text>
    <text x="920" y="124" text-anchor="end" font-size="20" letter-spacing="4" opacity="0.55">2024</text>
  </g>

  <!-- Title — anchored, not centred -->
  <g fill="#1f1612" font-family="Georgia, Cambria, 'Times New Roman', serif">
    <text x="104" y="620" font-style="italic" font-size="280" letter-spacing="-10">ERP</text>
    <text x="104" y="680" font-style="italic" font-size="34" letter-spacing="0" opacity="0.55">the ten-module ledger</text>
  </g>

  <!-- 10 module marks — hairline diamonds in a single row, last filled -->
  <g transform="translate(104 880)">
    <line x1="0" y1="20" x2="816" y2="20" stroke="#1f1612" stroke-width="0.6" opacity="0.35"/>
    <g stroke="#1f1612" stroke-width="1.2" fill="none">
      <polygon points="20,4 36,20 20,36 4,20"/>
      <polygon points="108,4 124,20 108,36 92,20"/>
      <polygon points="196,4 212,20 196,36 180,20"/>
      <polygon points="284,4 300,20 284,36 268,20"/>
      <polygon points="372,4 388,20 372,36 356,20"/>
      <polygon points="460,4 476,20 460,36 444,20"/>
      <polygon points="548,4 564,20 548,36 532,20"/>
      <polygon points="636,4 652,20 636,36 620,20"/>
      <polygon points="724,4 740,20 724,36 708,20"/>
      <polygon points="812,4 828,20 812,36 796,20" fill="#1f1612"/>
    </g>
    <text x="0" y="80" fill="#1f1612" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" letter-spacing="5" opacity="0.55">ONE&#160;OF&#160;TEN&#160;·&#160;TEN&#160;OF&#160;TEN</text>
  </g>

  <!-- Bottom eyebrow -->
  <g fill="#1f1612" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="104" y="1180" font-size="18" letter-spacing="3" opacity="0.6">NYLOS</text>
    <text x="920" y="1180" text-anchor="end" font-size="18" letter-spacing="3" opacity="0.6">ADDIS&#160;ABABA</text>
  </g>
</svg>
