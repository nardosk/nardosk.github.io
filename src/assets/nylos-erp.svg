<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="NYLOS ERP cover">
  <defs>
    <pattern id="erp-tibeb" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
      <polygon points="0,16 16,0 32,16" fill="#1c1410" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1024" height="1280" fill="#e0d2b8"/>

  <!-- Top tibeb band -->
  <line x1="0" y1="138" x2="1024" y2="138" stroke="#1c1410" stroke-width="1" opacity="0.55"/>
  <rect x="0" y="140" width="1024" height="16" fill="url(#erp-tibeb)"/>
  <line x1="0" y1="158" x2="1024" y2="158" stroke="#1c1410" stroke-width="1" opacity="0.55"/>

  <!-- Eyebrows -->
  <g fill="#1c1410" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="64" y="100" font-size="22" letter-spacing="4">01 — ENTERPRISE</text>
    <text x="960" y="100" text-anchor="end" font-size="22" letter-spacing="4" opacity="0.6">2024</text>
  </g>

  <!-- Title -->
  <text x="512" y="640" text-anchor="middle" fill="#1c1410" font-family="Georgia, Cambria, 'Times New Roman', serif" font-style="italic" font-size="240" letter-spacing="-6">ERP</text>

  <!-- 10 module diamonds in a row beneath the title -->
  <g stroke="#1c1410" stroke-width="1.5" fill="none" opacity="0.85">
    <g transform="translate(232 800)">
      <polygon points="0,0 18,18 0,36 -18,18"/>
      <polygon points="64,0 82,18 64,36 46,18"/>
      <polygon points="128,0 146,18 128,36 110,18"/>
      <polygon points="192,0 210,18 192,36 174,18"/>
      <polygon points="256,0 274,18 256,36 238,18"/>
      <polygon points="320,0 338,18 320,36 302,18"/>
      <polygon points="384,0 402,18 384,36 366,18"/>
      <polygon points="448,0 466,18 448,36 430,18"/>
      <polygon points="512,0 530,18 512,36 494,18"/>
      <polygon points="576,0 594,18 576,36 558,18" fill="#1c1410" fill-opacity="0.9"/>
    </g>
  </g>

  <!-- Caption under diamonds -->
  <text x="512" y="900" text-anchor="middle" fill="#1c1410" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="6" opacity="0.7">TEN&#160;&#160;MODULES&#160;&#160;ONE&#160;&#160;LEDGER</text>

  <!-- Bottom tibeb band -->
  <line x1="0" y1="1098" x2="1024" y2="1098" stroke="#1c1410" stroke-width="1" opacity="0.55"/>
  <rect x="0" y="1100" width="1024" height="16" fill="url(#erp-tibeb)"/>
  <line x1="0" y1="1118" x2="1024" y2="1118" stroke="#1c1410" stroke-width="1" opacity="0.55"/>

  <!-- Footer eyebrows -->
  <g fill="#1c1410" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="64" y="1190" font-size="20" letter-spacing="3" opacity="0.7">NYLOS</text>
    <text x="960" y="1190" text-anchor="end" font-size="20" letter-spacing="3" opacity="0.7">ADDIS&#160;ABABA</text>
  </g>
</svg>
