name: Deploy to GitHub Pages

# Builds the TanStack Start app with prerendering (BUILD_TARGET=pages disables the
# Cloudflare plugin and crawls in-page links to emit static HTML for every route),
# then publishes dist/client/ to GitHub Pages.
#
# Caveats:
#   - The contact form uses a TanStack server function (sendContactMessage) that has
#     no runtime on Pages. The form will POST to a non-existent endpoint and toast an
#     error. Replace with a mailto link, Formspree, or proxy through a Worker.
#   - For a custom domain (e.g. nardos.et), add a file at public/CNAME containing
#     just the bare domain — Vite copies public/* into dist/client/ during build.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; queue subsequent pushes rather than cancel mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (prerender + client only)
        env:
          BUILD_TARGET: pages
        run: npm run build

      - name: SPA fallback (404.html mirrors the prerendered shell)
        run: cp dist/client/index.html dist/client/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
