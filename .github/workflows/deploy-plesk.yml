name: Build and publish deploy branch (nardos.et via Plesk Git)

# Builds the TanStack Start app with prerendering (BUILD_TARGET=pages disables the
# Cloudflare plugin and crawls in-page links to emit static HTML for every route),
# then commits dist/client/ to the `deploy` branch as plain static files. Plesk's
# Git integration on nardos.et tracks that branch and pulls it straight into
# ~/httpdocs/, so the shared host never needs to run Node or have SSH access.
#
# The contact form posts to the Resend-backed Cloudflare Worker in worker/. Set
# the VITE_CONTACT_ENDPOINT repo secret to the deployed Worker URL so it gets
# baked into the static bundle at build time.
#
# Caveat: the `deploy` branch is build-output only; never commit source there directly.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-plesk
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (prerender + client only)
        env:
          BUILD_TARGET: pages
          VITE_CONTACT_ENDPOINT: ${{ secrets.VITE_CONTACT_ENDPOINT }}
        run: npm run build

      - name: SPA fallback (404.html mirrors the prerendered shell)
        run: cp dist/client/index.html dist/client/404.html

      - name: Publish built site to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: dist/client
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: build from ${{ github.sha }}"
